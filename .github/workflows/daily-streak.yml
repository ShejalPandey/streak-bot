name: Daily Streak

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make daily commit
        run: |
          date=$(date +%Y-%m-%d)
          echo "Daily streak commit - $date" >> streak.txt
          git config --local user.email "streak-bot@github.com"
          git config --local user.name "Daily Streak Bot"
          git add streak.txt
          git commit -m "Daily streak commit - $date" || echo "No changes to commit"
          git push
